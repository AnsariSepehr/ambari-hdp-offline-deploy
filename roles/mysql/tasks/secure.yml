- name: Ensure python3-pip is installed on the system
  package:
    name: python3-pip
    state: present
  become: yes

- name: Install PyMySQL (required for community.mysql modules)
  pip:
    name: PyMySQL
    state: present

- name: Set root password on fresh install (using socket auth)
  community.mysql.mysql_user:
    name: root
    host: localhost
    password: "{{ vault_mysql_root_password }}"
    login_unix_socket: "{{ mysql_datadir }}/mysql.sock"
    check_implicit_admin: yes
    state: present
  when: mysql_first_install | default(false)
  ignore_errors: yes

- name: Ensure root password is set (password auth)
  community.mysql.mysql_user:
    name: root
    host: localhost
    password: "{{ vault_mysql_root_password }}"
    login_user: root
    login_password: "{{ vault_mysql_root_password }}"
    state: present

- name: Force root to use mysql_native_password
  community.mysql.mysql_query:
    login_user: root
    login_password: "{{ vault_mysql_root_password }}"
    query: >
      ALTER USER 'root'@'localhost'
      IDENTIFIED WITH mysql_native_password
      BY '{{ vault_mysql_root_password }}';

- name: Install mysql_native_password plugin if missing
  community.mysql.mysql_query:
    login_user: root
    login_password: "{{ vault_mysql_root_password }}"
    query: "INSTALL PLUGIN mysql_native_password SONAME 'mysql_native_password.so';"
  ignore_errors: yes
  changed_when: false

- name: Install auth_socket plugin (as in your script)
  community.mysql.mysql_query:
    login_user: root
    login_password: "{{ vault_mysql_root_password }}"
    query: "INSTALL PLUGIN auth_socket SONAME 'auth_socket.so';"
  ignore_errors: yes
  changed_when: false

- name: Grant full privileges to root from remote / specific hosts
  community.mysql.mysql_user:
    name: root
    host: "{{ item }}"
    password: "{{ vault_mysql_root_password }}"
    priv: "*.*:ALL,GRANT"
    state: present
    login_user: root
    login_password: "{{ vault_mysql_root_password }}"
  loop:
    - "%"
    - "{{ ansible_fqdn }}"

- name: Flush privileges
  community.mysql.mysql_query:
    login_user: root
    login_password: "{{ vault_mysql_root_password }}"
    query: FLUSH PRIVILEGES;
